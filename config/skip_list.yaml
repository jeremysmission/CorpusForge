# CorpusForge Skip List — formats hashed but not parsed
# Date: 2026-04-05
# Rule: All skipped files are still SHA-256 hashed for the manifest.

# Formats deferred for production (hashed but not parsed)
deferred_formats:
  - ext: ".dwf"
    reason: "Design Web Format — deferred"

skip_conditions:
  encrypted: true
  zero_byte: true
  over_size_mb: 500
  temp_file_prefixes:
    - "~$"
    - "~"
  temp_file_extensions:
    - ".tmp"
    - ".partial"
    - ".bak"
    - ".swp"
