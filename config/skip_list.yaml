# LEGACY REFERENCE LIST — not the live mainline runtime config.
# CorpusForge Skip List — formats hashed but not parsed
# Date: 2026-04-07
# Rule: All skipped files are still SHA-256 hashed for the manifest.
# Rule: Mainline now loads skip/defer rules from config/config.yaml via paths.skip_list.
# Rule: Keep this file only as a historical/reference copy while older notes are retired.

# Formats deferred for production (hashed but not parsed)
deferred_formats:
  - ext: ".dwf"
    reason: "Design Web Format — no open-source parser available"

# Placeholder formats — recognized, hashed, identity-card text only (no content extraction)
# To fully skip a format: move it from placeholder_formats to deferred_formats
# To add parsing: remove it from here and add a real parser in src/parse/parsers/
placeholder_formats:
  - ext: ".dwg"
    reason: "AutoCAD Drawing — proprietary binary, convert to DXF for full parsing"
  - ext: ".dwt"
    reason: "AutoCAD Drawing Template — same binary family as DWG"
  - ext: ".prt"
    reason: "SolidWorks Part — requires SolidWorks + pywin32 COM API"
  - ext: ".sldprt"
    reason: "SolidWorks Part — same as .prt"
  - ext: ".asm"
    reason: "SolidWorks Assembly — requires SolidWorks + pywin32 COM API"
  - ext: ".sldasm"
    reason: "SolidWorks Assembly — same as .asm"
  - ext: ".mpp"
    reason: "Microsoft Project — MPXJ can read but needs Java runtime"
  - ext: ".vsd"
    reason: "Visio Diagram (Legacy) — binary OLE, convert to .vsdx for full parsing"
  - ext: ".one"
    reason: "OneNote Section — export to PDF or HTML before ingest"
  - ext: ".ost"
    reason: "Outlook Offline Storage — export as .msg or .eml preferred"
  - ext: ".eps"
    reason: "Encapsulated PostScript — needs extra rendering tooling"

# OCR sidecar / metadata junk — files generated by scanning tools that contain
# no useful content (XML manifests, font tables, coordinate data, MARC metadata).
# V1 lesson: 55.6% of corpus (3.5M chunks) was sidecar junk. Never again.
# These are matched by filename suffix (case-insensitive).
ocr_sidecar_suffixes:
  - "_djvu.xml"
  - "_djvu.txt"
  - "_hocr.html"
  - "_marc.xml"
  - "_meta.xml"
  - "_scandata.xml"
  - "_page_numbers.json"
  - ".info.json"
  - "_dc.xml"
  - "_reviews.xml"
  - "_toc.xml"
  - "_mods.xml"
  - "_extramarc.xml"
  - "_asr.json"
  - ".autogenerated.txt"
  - "_ocr.pdf"
  - "_ocr.txt"

skip_conditions:
  encrypted: true
  zero_byte: true
  over_size_mb: 500
  temp_file_prefixes:
    - "~$"
    - "~"
  temp_file_extensions:
    - ".tmp"
    - ".partial"
    - ".bak"
    - ".swp"
