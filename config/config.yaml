# CorpusForge Configuration — Live Runtime Config
# Date: 2026-04-04
# Rule: mainline operator runtime uses this file: config/config.yaml
# Note: GUI Save Settings writes here.
# Note: skip/defer rules are also loaded from this file via paths.skip_list.

paths:
  source_dirs:
    - "ProductionSource/verified/source"
  output_dir: "data/production_output"
  state_db: "data/production_state_run6.sqlite3"
  landing_zone: "data/source"
  skip_list: "config/config.yaml"   # Live skip/defer rule source for mainline.

chunk:
  size: 1200
  overlap: 200
  max_heading_len: 160

parse:
  timeout_seconds: 60
  ocr_mode: "auto"
  docling_mode: "off"           # Optional parser lane: off | fallback | prefer. Safe default is off.
  max_chars_per_file: 5000000
  defer_extensions:
    - ".dwg"
    - ".dwt"
    - ".dxf"
    - ".stp"
    - ".step"
    - ".ste"
    - ".igs"
    - ".iges"
    - ".stl"
    - ".vsdx"
    - ".drawio"
    - ".svg"
    - ".dia"
    - ".psd"
    - ".jpg"
    - ".jpeg"
    - ".sao"
    - ".rsf"

embed:
  enabled: true           # Set false for chunk-only export (no vectors, no GPU needed)
  model_name: "nomic-ai/nomic-embed-text-v1.5"
  dim: 768
  device: "cuda"
  max_batch_tokens: 49152
  dtype: "float16"

enrich:
  enabled: false
  ollama_url: "http://127.0.0.1:11434"
  model: "phi4:14b-q4_K_M"
  max_chunk_chars: 500
  max_concurrent: 2              # Concurrent Ollama requests (I/O-bound). Typical workstation: 2-3.

extract:
  enabled: false                 # GLiNER2 entity extraction
  model_name: "urchade/gliner_multi-v2.1"
  entity_types:
    - PART_NUMBER
    - PERSON
    - SITE
    - DATE
    - ORGANIZATION
    - FAILURE_MODE
    - ACTION
  min_confidence: 0.5
  batch_size: 32                 # GLiNER batch inference size. Higher = faster, more RAM.
  max_concurrent: 16             # Concurrent extraction workers. Typical workstation: 16.

pipeline:
  full_reindex: false
  log_level: "INFO"
  workers: 16                    # Parallel parser workers. Use logical CPU threads, not physical cores. Desktop: 32, laptop: 20, current machine: 16.

nightly_delta:
  enabled: true
  source_root: "ProductionSource/verified/source/verified/IGS"
  mirror_root: "data/nightly_delta/source_mirror"
  transfer_state_db: "data/nightly_delta/source_transfer_state.sqlite3"
  manifest_dir: "data/nightly_delta/manifests"
  pipeline_output_dir: "data/production_output"
  pipeline_state_db: "data/production_state_run6.sqlite3"
  pipeline_log_dir: "logs/nightly_delta"
  stop_file: "data/nightly_delta/nightly_delta.stop"
  transfer_workers: 8
  canary_globs:
    - "*nightly_canary*"
    - "*canary*"
  require_canary: false
  max_files:
  task_name: "CorpusForge Nightly Delta"
  task_start_time: "02:00"

hardware:
  gpu_index: 0       # GPU 0 = compute, GPU 1 = display
  embed_batch_size: 256

skip:
  deferred_formats:
    - ext: ".dwf"
      reason: "Design Web Format — no open-source parser available"

  placeholder_formats:
    - ext: ".dwg"
      reason: "AutoCAD Drawing — proprietary binary, convert to DXF for full parsing"
    - ext: ".dwt"
      reason: "AutoCAD Drawing Template — same binary family as DWG"
    - ext: ".prt"
      reason: "SolidWorks Part — requires SolidWorks + pywin32 COM API"
    - ext: ".sldprt"
      reason: "SolidWorks Part — same as .prt"
    - ext: ".asm"
      reason: "SolidWorks Assembly — requires SolidWorks + pywin32 COM API"
    - ext: ".sldasm"
      reason: "SolidWorks Assembly — same as .asm"
    - ext: ".mpp"
      reason: "Microsoft Project — MPXJ can read but needs Java runtime"
    - ext: ".vsd"
      reason: "Visio Diagram (Legacy) — binary OLE, convert to .vsdx for full parsing"
    - ext: ".one"
      reason: "OneNote Section — export to PDF or HTML before ingest"
    - ext: ".ost"
      reason: "Outlook Offline Storage — export as .msg or .eml preferred"
    - ext: ".eps"
      reason: "Encapsulated PostScript — needs extra rendering tooling"

  ocr_sidecar_suffixes:
    - "_djvu.xml"
    - "_djvu.txt"
    - "_hocr.html"
    - "_marc.xml"
    - "_meta.xml"
    - "_scandata.xml"
    - "_page_numbers.json"
    - ".info.json"
    - "_dc.xml"
    - "_reviews.xml"
    - "_toc.xml"
    - "_mods.xml"
    - "_extramarc.xml"
    - "_asr.json"
    - ".autogenerated.txt"
    - "_ocr.pdf"
    - "_ocr.txt"

  # Image-asset family — hash/defer automatically when parse.ocr_mode == "skip".
  # Evidence: Run 6 (2026-04-09, export_20260409_0720) produced 15,239 image
  # "chunks" of which 15,237 were pure [IMAGE_METADATA] filename/size junk
  # because the workstation had no Tesseract/Pillow. Deferring this family on
  # OCR-disabled runs removes ~6.3% of chunk noise while preserving hash
  # continuity. When ocr_mode is "auto" or "force" these extensions still
  # flow through the normal image parser.
  image_asset_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".gif"
    - ".bmp"
    - ".tif"
    - ".tiff"
    - ".webp"
    - ".svg"
    - ".wmf"
    - ".emf"
    - ".psd"

  # Encrypted-by-filename-cue tokens — case-insensitive substring match against
  # the file basename. Distinct class from the magic-byte detector so operators
  # can see name-cue vs true-encryption counts separately in skip_manifest.json.
  # Generic tokens only — do not add customer-specific prefixes.
  encrypted_filename_tokens:
    - "encrypted"
    - "password-protected"
    - "password_protected"
    - "drm-protected"
    - "drm_protected"

  skip_conditions:
    encrypted: true
    zero_byte: true
    over_size_mb: 500
    temp_file_prefixes:
      - "~$"
      - "~"
    temp_file_extensions:
      - ".tmp"
      - ".partial"
      - ".bak"
      - ".swp"
